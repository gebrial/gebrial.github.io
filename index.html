<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gebrial's portfolio — a terminal you can type in. ls, cd, and launch your way through my projects.">
  <title>gebrial@github.io</title>
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <main id="terminal" aria-label="interactive terminal"></main>
  <nav id="quick-commands" aria-label="quick commands">
    <button data-cmd="help">help</button>
    <button data-cmd="ls">ls</button>
    <button data-cmd="cd projects">cd projects</button>
    <button data-cmd="cat about.txt">cat about.txt</button>
    <button data-cmd="cat contact.txt">cat contact.txt</button>
  </nav>
  <script type="module" src="js/main.js"></script>
</body>
</html>
